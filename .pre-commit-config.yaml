repos:
- repo: local
  hooks:
    - id: black
      name: black formatter
      entry: black
      language: system
      types: [python]

    - id: flake8
      name: flake8 linter
      entry: flake8
      language: system
      types: [python]

    - id: pylint
      name: pylint linter
      entry: pylint
      language: system
      types: [python]
      args: ["--rcfile=.pylintrc", "--disable=R,C"]